name: CI

on:
  push:
    branches: [main]
  pull_request:

# Does NOT compile the Rust/Tauri side (apps/orchestra-cockpit/src-tauri) — a
# `cargo check` on ubuntu-latest needs system libs (webkit2gtk, libgtk-3, …)
# that aren't installed here. Deliberately deferred, not a silent gap: the
# four TypeScript packages/apps are the whole workspace except Rust.

# Read-only by default (CodeRabbit, PR #1 review, 2026-07-18) — this workflow
# only checks out and reads code, never pushes, tags, or opens anything.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `bun install` runs dependency lifecycle scripts after this step;
          # a persisted git credential would be reachable from that untrusted
          # code (CodeRabbit, PR #1 review, 2026-07-18).
          persist-credentials: false

      # Pinned to the exact version verified working during Phase 0 (2026-07-18)
      # rather than "latest" — an upstream Bun release breaking unrelated CI is
      # a distraction this repo doesn't need; bump deliberately when there's a
      # reason to.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # --frozen-lockfile: fail if bun.lock is stale, rather than silently
      # resolving and testing against dependencies nobody committed.
      - run: bun install --frozen-lockfile

      # Phase 2 (spec docs/specs/2026-07-19-phase-2-stacked-pr-actions.md) —
      # gh.ts's tests call the real `gh` CLI (against this repo for gh.test.ts,
      # against throwaway local-origin repos for stackedAction.test.ts, which
      # `gh` still refuses to touch without this). `gh` refuses to run AT ALL
      # inside GitHub Actions without an explicit token — a preflight check
      # baked into the CLI itself, independent of what remote a command
      # targets. github.token is already scoped read-only by this workflow's
      # own `permissions: contents: read` above — this wires the same,
      # already-minimal token through, not a new grant.
      - run: bun run test
        env:
          GH_TOKEN: ${{ github.token }}

      - run: bunx tsc --noEmit
        working-directory: packages/orchestra-core

      - run: bunx tsc --noEmit
        working-directory: packages/orchestra-daemon

      - run: bunx tsc --noEmit
        working-directory: packages/orchestra-cli

      - run: bunx tsc --noEmit
        working-directory: apps/orchestra-cockpit

      # Confirms the committed migrations still match schema.ts — the same
      # check run by hand before every schema-touching commit so far.
      - run: bunx drizzle-kit check
        working-directory: packages/orchestra-daemon
